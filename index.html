<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>最強ツール</title>
<style>
body{font-family:sans-serif;max-width:700px;margin:auto;padding:20px;padding-bottom:120px;}
input,select,button{width:100%;padding:12px;margin-bottom:10px;box-sizing:border-box}
button{cursor:pointer}
.hidden{display:none}
.box{border:1px solid #ccc;border-radius:8px;padding:10px;margin-top:10px}
.msg-display{text-align:center;font-size:18px;font-weight:bold;color:#3f51b5;min-height:100px;margin-bottom:10px;background:#e8eaf6;padding:10px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;overflow:hidden}
.play-btn-container{position:fixed;bottom:0;left:0;width:100%;background:rgba(255,255,255,0.95);padding:10px 20px;box-sizing:border-box;border-top:2px solid #ccc;z-index:9999;display:flex;justify-content:center}
.play-btn{background-color:#4caf50;color:white;border:none;font-size:22px;font-weight:bold;padding:15px;width:100%;max-width:660px;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.2)}
.play-btn:disabled{background-color:#757575}
.slot-history-box{background:#263238;color:#00e676;padding:12px;border-radius:6px;margin-top:15px;max-height:140px;overflow-y:auto;font-family:monospace;font-size:12px}
.red-serif{color:#d32f2f;font-weight:bold;font-size:20px}
.blackout-reels{background:#000!important;box-shadow:inset 0 0 20px #ff0000!important}
.blackout-msg{background:#000!important;color:#fff!important;border:2px solid #d32f2f}
</style>
</head>
<body>

<div id="slotArea">
 <div id="samaiDisplay" style="font-size:18px; font-weight:bold;">差枚: 0枚</div>
 <div id="slotState">状態: 通常</div>
 <div id="normalGameCount">通常: 0G</div>
 <div id="slotReelsContainer" class="reels" style="display:flex;justify-content:center;gap:15px;margin:20px 0;background:#222;padding:20px;border-radius:10px;">
  <div id="reel1" style="width:60px;background:white;text-align:center;">🎰</div><div id="reel2" style="width:60px;background:white;text-align:center;">🎰</div><div id="reel3" style="width:60px;background:white;text-align:center;">🎰</div>
 </div>
 <div id="msgDisplay" class="msg-display">レバーを叩け！</div>
 <div class="play-btn-container">
  <button id="mainPlayBtn" class="play-btn" onclick="playSlot()">PLAY (-3枚)</button>
 </div>
 <div id="slotHistoryList" class="slot-history-box"></div>
</div>

<script>
let netSamai=0, normalGames=0, currentMode="NORMAL", bigRemaining=0, czRemaining=0, isReplayG=false, battleState="NONE";
let nextCeiling = 300; // 初期天井300G

function addSlotHistory(text, mode, trigger){
 let hist = document.getElementById("slotHistoryList");
 hist.innerHTML = `<div>${text} [契機:${trigger}][滞在:${mode}]</div>` + hist.innerHTML;
}

function lockPlayButton(){
 let btn = document.getElementById("mainPlayBtn");
 btn.disabled = true; setTimeout(() => btn.disabled = false, 1000);
}

function playSlot(){
 if(!isReplayG) netSamai -= 3;
 else isReplayG = false;

 // 抽選ロジック
 let role = Math.random();
 let payout = 0, roleName = "ハズレ";
 if(role < 1/7) { roleName = "リプレイ"; isReplayG = true; }
 else if(role < 0.4) { payout = 14; roleName = "ベル"; }
 else if(role < 0.5) { payout = 6; roleName = "スイカ"; }
 netSamai += payout;

 // 通常時ロジック
 if(currentMode === "NORMAL"){
  normalGames++;
  if(normalGames >= nextCeiling){
   // 天井到達
   if(nextCeiling === 300) nextCeiling = 200; // 次回200Gへ短縮
   else nextCeiling = 300; // 恩恵終了で戻る
   currentMode = "BONUS_READY";
   addSlotHistory(normalGames + "G", "通常", "天井");
   normalGames = 0;
  }
 }
 
 document.getElementById("msgDisplay").innerHTML = `<div>${roleName} [+${payout}枚]</div>`;
 document.getElementById("samaiDisplay").innerText = "差枚: " + netSamai;
 document.getElementById("normalGameCount").innerText = "通常: " + normalGames + "G (次回天井:" + nextCeiling + "G)";
 lockPlayButton();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最強ツール</title>
<style>
body{font-family:sans-serif;max-width:700px;margin:auto;padding:20px}
input,select,button{width:100%;padding:12px;margin-bottom:10px;box-sizing:border-box}
button{cursor:pointer}
.hidden{display:none}
.box{border:1px solid #ccc;border-radius:8px;padding:10px;margin-top:10px}
pre{white-space:pre-wrap}
.row{display:flex;gap:8px}
.row input{margin-bottom:0}
.smallbtn{width:auto;padding:4px 8px;margin-left:8px}
.grid3{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
 margin-top:10px;
 margin-bottom:30px;
}
.grid3 button{
 margin:0;
}

/* --- スロット用の拡張スタイル --- */
.slot-header {
 display: flex;
 justify-content: flex-end;
 align-items: center;
 margin-bottom: 15px;
}
.samai-display {
 font-size: 18px;
 font-weight: bold;
}
.status-panel {
 background: #f5f5f5;
 border: 2px solid #333;
 border-radius: 6px;
 padding: 10px;
 margin-bottom: 15px;
 display: flex;
 flex-wrap: wrap;
 justify-content: space-around;
 gap: 10px;
 font-weight: bold;
}
.status-item {
 font-size: 16px;
}
.status-state {
 color: #e91e63;
 font-size: 18px;
 width: 100%;
 text-align: center;
 border-bottom: 1px dashed #ccc;
 padding-bottom: 5px;
}
.reels {
 display: flex;
 justify-content: center;
 gap: 15px;
 font-size: 40px;
 margin: 20px 0;
 background: #222;
 padding: 20px;
 border-radius: 10px;
 box-shadow: inset 0 0 10px #000;
 transition: background-color 0.3s;
}
.reel {
 width: 80px;
 text-align: center;
 background: white;
 border-radius: 5px;
 height: 60px;
 line-height: 60px;
}

/* ★ボタンの位置を固定するため、高さを120pxに固定＆中央配置に */
.msg-display {
 text-align: center;
 font-size: 18px;
 font-weight: bold;
 color: #3f51b5;
 height: 120px; 
 box-sizing: border-box;
 margin-bottom: 10px;
 background: #e8eaf6;
 padding: 10px;
 border-radius: 4px;
 display: flex;
 align-items: center;
 justify-content: center;
 flex-direction: column;
 gap: 8px;
 overflow: hidden;
 transition: background-color 0.3s, color 0.3s;
}
.play-btn {
 background-color: #4caf50;
 color: white;
 border: none;
 font-size: 20px;
 font-weight: bold;
 border-radius: 8px;
 padding: 15px;
}
.slot-history-box {
 background: #263238;
 color: #00e676;
 font-family: monospace;
 padding: 12px;
 border-radius: 6px;
 margin-top: 15px;
 margin-bottom: 15px;
 max-height: 180px;
 overflow-y: auto;
 font-size: 14px;
 line-height: 1.5;
 box-shadow: inset 0 0 5px #000;
}
.slot-history-title {
 color: #fff;
 font-weight: bold;
 border-bottom: 1px solid #546e7a;
 padding-bottom: 4px;
 margin-bottom: 6px;
 font-size: 13px;
}

/* チャンスアップ・赤セリフ */
.red-serif {
 color: #d32f2f !important;
 font-weight: bold !important;
 font-size: 22px !important;
 text-shadow: 1px 1px 1px #fff;
}

/* フリーズ・ブラックアウト演出用 */
.blackout-reels {
 background: #000000 !important;
 box-shadow: inset 0 0 20px #ff0000 !important;
}
.blackout-reels .reel {
 background: #111 !important;
 color: #111 !important;
}
.blackout-msg {
 background: #000000 !important;
 color: #fff !important;
 border: 2px solid #d32f2f;
}
</style>
</head>
<body>

<div id="topArea">
 <h2 class="appTitle"></h2>
 <button onclick="showSlot()">スロット</button>
 <button onclick="showLogin()">パチスロツール</button>
</div>

<div id="loginArea" class="hidden">
 <h2 class="appTitle">暗証番号入力</h2>

</div>

<div id="slotArea" class="hidden">

  <div id="samaiDisplay" class="samai-display">差枚: 0枚</div>

 <div class="status-panel">

  <div class="status-item" id="normalGameCount">通常: 0G</div>
  <div class="status-item" id="subGameCount"></div>
  <div class="status-item" id="totalBonusGameCount" style="display:none;">累計BB: 0G</div>
 </div>

 <div id="slotReelsContainer" class="reels">
  <div id="reel1" class="reel">🎰</div>
  <div id="reel2" class="reel">🎰</div>

 <div id="msgDisplay" class="msg-display"><div>レバーを叩け！</div></div>

  <div class="slot-history-title">📊 スロットデータ履歴 (最新順)</div>
  <div id="slotHistoryList">履歴はありません</div>

<button onclick="showKouryakuPage('マギアレコード')">マギアレコード</button>

<script>
const APP_NAME="最強ツール";
const PASSWORD="120708";
const USER_NAME="加藤";

let resultText="";
let tenseiHistory=[];

/* --- スロット用の内部変数 --- */
let netSamai = 0; 
const YEN_PER_MEDAL = 21.73913043478261; 

let currentMode = "NORMAL"; 
let normalGames = 0;
let czRemaining = 0;
let bigRemaining = 0;
let totalBigGames = 0;
let nextBonusType = "777"; 

let bonusStartSamai = 0; 
let lastCalculatedGain = 0; 

let internalMode = 1; 
const MODE_NAMES = ["低確", "通常", "高確", "超高確"];

let isLoopMode = false;
let triggeredBy300G = false; 

let zenchoRemaining = 0;   
let isZenchoHit = false;    
let zenchoTriggerSource = ""; 
let nextSerifuInterval = 0; 

/* --- BIG中 変数 --- */
let bigBattleGames = 0;       
let bZenchoRemaining = 0;     
let battleState = "NONE";     
let battleCount = 0;          
let enemyType = "";           
let isBattleWin = false;      
let isBZenchoHitActual = false; 

/* --- 引き戻しシステム用変数 --- */
let hasHikimodoshi = false;      
let isHikimodoshiZon = false;    
let hikimodoshiGameCount = 0;    

let slotHistories = [];

function addSlotHistory(text) {
 slotHistories.unshift(text); 
 const historyEl = document.getElementById("slotHistoryList");
 if (historyEl) {
  historyEl.innerHTML = slotHistories.map(h => `<div>${h}</div>`).join("");
 }
}

let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playTone(freq, type, duration, vol = 0.1) {
 try {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
 } catch(e) {}
}

function soundStart() { 
 playTone(300, 'sine', 0.05, 0.08); 
 setTimeout(() => playTone(600, 'sine', 0.08, 0.05), 40); 
}
function soundRare() { playTone(587, 'square', 0.06); setTimeout(() => playTone(880, 'square', 0.06), 60); setTimeout(() => playTone(1174, 'square', 0.1), 120); }
function soundWinSmall() { playTone(987, 'triangle', 0.08); setTimeout(() => playTone(1318, 'triangle', 0.1), 80); }
function soundBonusEnd() { playTone(200, 'sawtooth', 0.3); }
function soundUwanose告知() {
 const scale = [880, 987, 1046, 1174, 1318, 1568];
 scale.forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.08, 0.15), i * 50));
}
function soundBattleStart() { playTone(440, 'sawtooth', 0.1); setTimeout(() => playTone(392, 'sawtooth', 0.1), 100); setTimeout(() => playTone(523, 'sawtooth', 0.3), 200); }
function soundBlackout() {
 playTone(150, 'sawtooth', 0.5, 0.3);
 setTimeout(() => playTone(100, 'sawtooth', 0.8, 0.4), 200);
}

window.onload=()=>{
 document.title=APP_NAME;
 document.querySelectorAll(".appTitle").forEach(x=>x.innerText=APP_NAME);
 if(localStorage.getItem("loggedIn")==="true") showMenu(); else showTop();
 updateAnimalOptions();
};

function hideAll(){
 ["topArea","loginArea","slotArea","menuArea","kouryakuArea","hokutoTensei2Area","tekken6Area","hokutoArea","godArea","magirecoArea","unset1Area","unset2Area","unset3Area","unset4Area","tenseiArea","seisanArea"].forEach(id=>{
  const el = document.getElementById(id); if(el) el.classList.add("hidden");
 });
}

function showTop(){hideAll(); document.getElementById("topArea").classList.remove("hidden");}
function showLogin(){hideAll(); document.getElementById("loginArea").classList.remove("hidden"); document.getElementById("password").value="";}
function showSlot(){hideAll(); document.getElementById("slotArea").classList.remove("hidden"); updateSlotDisplay(); initAudio();}
function showMenu(){hideAll(); document.getElementById("menuArea").classList.remove("hidden");}
function showKouryaku(){hideAll(); document.getElementById("kouryakuArea").classList.remove("hidden");}
function showTensei(){hideAll(); document.getElementById("tenseiArea").classList.remove("hidden"); updateTenseiPreview();}
function showSeisan(){hideAll(); document.getElementById("seisanArea").classList.remove("hidden");}

function showKouryakuPage(name){
 hideAll();
 const map={"北斗転生2":"hokutoTensei2Area","鉄拳6":"tekken6Area","北斗の拳":"hokutoArea","ミリオンゴッド":"godArea","magirecoArea":"magirecoArea"};
 if(map[name]) document.getElementById(map[name]).classList.remove("hidden");
 else document.getElementById("unset1Area").classList.remove("hidden");
}

function login(){
 if(document.getElementById("password").value===PASSWORD){ localStorage.setItem("loggedIn","true"); showMenu(); }
 else alert("暗証番号が違います");
}

function updateSlotDisplay() {
 let samaiColor = netSamai >= 0 ? "#00e676" : "#d32f2f";
 let samaiSign = netSamai >= 0 ? "+" : "";
 document.getElementById("samaiDisplay").innerHTML = `<span style="color:${samaiColor};">差枚: ${samaiSign}${netSamai}枚</span>`;
 
 const stateEl = document.getElementById("slotState");
 const normalGEl = document.getElementById("normalGameCount");
 const subGEl = document.getElementById("subGameCount");
 const totalBBEl = document.getElementById("totalBonusGameCount");

 document.getElementById("slotReelsContainer").classList.remove("blackout-reels");
 document.getElementById("msgDisplay").classList.remove("blackout-msg");

 let loopStatusStr = isLoopMode ? " [天国ループ!?]" : "";
 normalGEl.innerText = `通常: ${normalGames}G${loopStatusStr}`;
 
 if (currentMode === "NORMAL") {
  stateEl.innerText = "状態: 通常モード";
  stateEl.style.color = "#333";
  subGEl.innerText = "";
  totalBBEl.style.display = "none";
 } else if (currentMode === "CZ") {
  stateEl.innerText = "状態: 💥チャンスゾーン(CZ)💥";
  stateEl.style.color = "#ff5722";
  subGEl.innerText = `CZ残り: LAST ${czRemaining}G`;
  totalBBEl.style.display = "none";
 } else if (currentMode === "BONUS_READY") {
  stateEl.innerText = "状態: 🎰確定画面🎰";
  stateEl.style.color = "#4caf50";
  subGEl.innerText = "狙え! [777]";
  totalBBEl.style.display = "none";
 } else if (currentMode === "BIG") {
  totalBigGames = Math.max(totalBigGames, 1);
  totalBBEl.innerText = `累計BB: ${totalBigGames}G`;
  totalBBEl.style.display = "block";

  let isHold = (battleState !== "NONE");
  let gameDisplayStr = isHold ? "LAST ?G" : `LAST ${bigRemaining}G`;

  if (battleState === "NONE") {
   stateEl.innerText = "状態: 🔴BIG BONUS🔴";
   stateEl.style.color = "#e91e63";
   subGEl.innerHTML = `${gameDisplayStr} <span style="color:#7f8c8d; font-size:14px; margin-left:8px;">(区切り: ${bigBattleGames}G)</span>`;
  } else if (battleState === "PRE") {
   stateEl.innerText = "状態: 🎬作戦区域(前兆)🎬";
   stateEl.style.color = "#9c27b0";
   subGEl.innerHTML = `<span style="color:#9c27b0;">G数ホールド中！ (発展まであと ${bZenchoRemaining}G)</span>`;
  } else if (battleState === "BATTLE") {
   stateEl.innerText = `状態: ⚔️対戦中 vs ${enemyType}⚔️`;
   stateEl.style.color = "#ff9800";
   subGEl.innerHTML = `<span style="color:#ff9800; font-size:16px;">G数ホールド中！ バトル ${battleCount}/3 G目</span>`;
  } else if (battleState === "REWARD") {
   stateEl.innerText = "状態: 👑報酬告知ホールド👑";
   stateEl.style.color = "#00e676";
   subGEl.innerHTML = `<span style="color:#00e676; font-size:16px;">G数ホールド中！ 運命のレバーオン！</span>`;
  }
 }
}

function getSerifuEffect(isHit, currentModeIndex) {
 let text = "「……レバーを叩くんだ！」";
 let isRed = false; 
 let seed = Math.random();

 if (isHit) {
  if (seed < 0.05) {
   let r = Math.random();
   if (r < 0.5) text = "「あっつい！あっつい！」";
   else text = "「このあとチャンスだぞ！」";
   isRed = true;
  } else {
   let r = Math.random();
   if (r < 0.3) text = "「何かが起きる予感……！」";
   else if (r < 0.6) text = "「気配を感じる……。」";
   else if (r < 0.8) text = "「諦めるのはまだ早いぞ！」";
   else text = "「神の領域へ……！？」";
  }
 } else {
  let r = Math.random();
  if (r < 0.3) text = "「何かが起きる予感……！」";
  else if (r < 0.6) text = "「気配を感じる……。」";
  else text = "「……静かだな。」";
 }

 if (isRed) {
  return `<span class="red-serif">${text}</span>`;
 } else {
  return `<span>${text}</span>`;
 }
}

/* --- スロット実行メイン --- */
function playSlot() {
 netSamai -= 3; 
 soundStart();
 
 // ================= ①最優先：払い出し＆特殊フラグ抽選 =================
 let randBonusFlags = Math.random();
 let is777揃いフラグ = false;
 let is77ハズレフラグ = false;

 if (currentMode === "BIG" && battleState === "NONE") {
  if (randBonusFlags < 1 / 155) {
   is777揃いフラグ = true;
  } else if (randBonusFlags < (1 / 155) + (1 / 55)) {
   is77ハズレフラグ = true;
  }
 }

 let roll = Math.random();
 let roleName = "ハズレ";
 let reelStr = ["🍒", "🍉", "🔔"]; 
 
 let isBonus = (currentMode === "BIG");
 let bell8Prob = (currentMode === "CZ") ? (1 / 3.3) : (isBonus ? (1 / 2.6) : (1 / 22)); 
 let bell3Prob = isBonus ? (1 / 2.6) : (1 / 6);

 if (is777揃いフラグ) {
  roleName = "777揃い";
  reelStr = ["7️⃣", "7️⃣", "7️⃣"];
 } else if (is77ハズレフラグ) {
  roleName = "77フェイク";
  reelStr = ["7️⃣", "7️⃣", "🦧"]; 
 } else {
  if (roll < 1/7) { roleName = "リプレイ"; reelStr = ["🔄", "🔄", "🔄"]; } 
  else if (roll < 1/7 + bell3Prob) { roleName = "3枚ベル"; reelStr = ["🔔", "🔔", "🔔"]; } 
  else if (roll < 1/7 + bell3Prob + bell8Prob) { roleName = isBonus ? "14枚ベル" : "8枚ベル"; reelStr = ["🟡", "🟡", "🟡"]; } 
  else if (roll < 1/7 + bell3Prob + bell8Prob + 1/64) { roleName = "スイカ"; reelStr = ["🍉", "🍉", "🍉"]; } 
  else if (roll < 1/7 + bell3Prob + bell8Prob + 1/64 + 1/128) { roleName = "チェリー"; reelStr = ["🍒", "🦧", "🦧"]; }
 }

 document.getElementById("reel1").innerText = reelStr[0];
 document.getElementById("reel2").innerText = reelStr[1];
 document.getElementById("reel3").innerText = reelStr[2];

 let payout = 0;
 let medalDiffText = "-3枚"; 

 // ★リールメッセージから「フェイク」等のネタバレ文字を排除しスッキリ化
 if (is777揃いフラグ) { payout = 0; medalDiffText = "±0枚"; soundUwanose告知(); }
 else if (is77ハズレフラグ) { payout = 0; medalDiffText = "-3枚"; }
 else if (roleName === "リプレイ") { payout = 0; medalDiffText = "±0枚"; }
 else if (roleName === "3枚ベル") { payout = 3; soundWinSmall(); medalDiffText = "+3枚"; }
 else if (roleName === "8枚ベル") { payout = 8; soundWinSmall(); medalDiffText = "+8枚"; }
 else if (roleName === "14枚ベル") { payout = 14; soundWinSmall(); medalDiffText = "+14枚"; }
 else if (roleName === "スイカ") { payout = 6; soundRare(); medalDiffText = "+6枚"; }
 else if (roleName === "チェリー") { payout = 2; soundRare(); medalDiffText = "+2枚"; }

 let machineRate=""; let expect="";

 if(machine==='北斗転生') machineRate = animal==='ウリ坊' ? "機械割#99" : "機械割#106";
 if(machine==='鉄拳' && animal==='リセ') expect="等価期待値1479";
 if(machine==='ミリオンゴッド'){
  if(animal==='前回VVV揃い後') machineRate="機械割#130";
  else if(['前回Z-ZONE後','前回赤7揃い後','前回天井到達後'].includes(animal)) machineRate="機械割#102";
  else if(animal==='前回GOD揃い後') machineRate="機械割#101";
  else if(animal==='AT間連荘狙い') expect="等価期待値";
 }

 const gainText = "獲得玉###" + [...tenseiHistory].reverse().map(x=>x.gain).join("#");
 const hitText = tenseiHistory.map(x=>{
  if(machine==='ミリオンゴッド') return `${x.game}#${x.chain===1?1: x.chain}`;
  if(x.chain===1) return `${x.game}#1`;
  return `${x.game}#1#2###${x.chain}`;
 }).join("\n");

 const headerBBAT = (machine==='鉄拳') ? "(1:BB 2:AT)" : "(1:RB 2:AT)";
 const totalSpinV = document.getElementById("totalSpin").value||0;
 const remainBallV = document.getElementById("remainBall").value||0;
 const saveBallV = document.getElementById("saveBall").value||0;
 const cashBallV = document.getElementById("cashBall").value||0;
 const yameGameV = document.getElementById("yameGame").value||0;
 const startSpinV = document.getElementById("startSpin").value||0;
 const rateV = document.getElementById("rate").value;
 const storeV = document.getElementById("store").value;
 const daiBanV = document.getElementById("daiBan").value||0;

 tOutput.textContent=`機種番号${baseNo}
計算条件1
(${machine} ${animal}${machineNoVal})
${headerBBAT}

${expect}
${machineRate}
仕事量同集計
総回転数${totalSpinV}

${gainText}

残玉${remainBallV}
貯玉${saveBallV}
現金${cashBallV}

${yameGameV}#0
${hitText}

着席時回転数${startSpinV}
天井消化${startSpinV}
着席時総回転数${totalSpinV}
換金率1000#${rateV}
貸玉1000#${rateV}

店名${storeV}
台番${daiBanV}
名前${USER_NAME}`;
}

async function copyTensei(e){
 const btn=e.target;
 const tOutput = document.getElementById("tenseiOutput");
 try{ await navigator.clipboard.writeText(tOutput.textContent); const old=btn.innerText; btn.innerText="コピーしました！"; setTimeout(()=>btn.innerText=old||"コピー",1000); }catch(err){alert("コピー失敗");}
}

async function copyText(e){
 const btn=e.target;
 try{ await navigator.clipboard.writeText(resultText); const old=btn.innerText; btn.innerText="コピーしました！"; setTimeout(()=>btn.innerText=old||"コピー",1000); }catch(err){alert("コピー失敗");}
}

function calculate(){
 const sd = document.getElementById("seed");
 const sl = document.getElementById("salary");
 const iv = document.getElementById("investment");
 const ch = document.getElementById("cash");
 const op = document.getElementById("output");
 if(!sd || !sl || !iv || !ch || !op) return;

 const seedV=Number(sd.value||0); const salaryV=Number(sl.value||0); const investV=Number(iv.value||0); const cashV=Number(ch.value||0);
 const next=seedV+cashV-salaryV-investV;
 const d=new Date(); const w=["日","月","火","水","木","金","土"];
 resultText=`${d.getMonth()+1}/${d.getDate()}(${w[d.getDay()]})${USER_NAME}
種銭${seedV.toLocaleString()}
日当${salaryV.toLocaleString()}
投資${investV.toLocaleString()}
換金${cashV.toLocaleString()}
次回${next.toLocaleString()}`;
 op.textContent=resultText;
}
</script>
